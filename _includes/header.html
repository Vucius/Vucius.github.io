<header class="relative m-0 px-4 py-4 mb-8">
    <nav class="flex items-center justify-between w-full" aria-label="主导航">
        <!-- 桌面端导航 -->
        <div class="hidden md:flex items-center space-x-4 w-full justify-center">
            <a href="{{ '/' | relative_url }}"
                class="px-4 py-3 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors font-bold">
                Home
            </a>
            <a href="{{ '/archive' | relative_url }}"
                class="px-4 py-3 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                posts
            </a>
            <a href="{{ '/about' | relative_url }}"
                class="px-4 py-3 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                About
            </a>
            <style>
                .group:hover .group-hover-menu {
                    opacity: 1 !important;
                    visibility: visible !important;
                }
            </style>
            <div class="relative group">
                <button class="px-4 py-3 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors flex items-center animate-fade-in">
                    Miscellany
                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div class="group-hover-menu absolute left-1/2 transform -translate-x-1/2 pt-2 w-48 opacity-0 invisible transition-all duration-300 z-50">
                    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl border border-gray-100 dark:border-gray-700 py-2">
                        <a href="{{ '/gomoku/' | relative_url }}"
                            class="block px-4 py-2 text-sm text-center text-black dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                            Gomoku
                        </a>
                        <a href="{{ '/hancolumnencoder/' | relative_url }}"
                            class="block px-4 py-2 text-sm text-center text-black dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 transition-colors border-t border-gray-100 dark:border-gray-700">
                            Han Column Encoder
                        </a>
                        <a href="{{ '/collections/' | relative_url }}"
                            class="block px-4 py-2 text-sm text-center text-black dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-blue-600 dark:hover:text-blue-400 transition-colors border-t border-gray-100 dark:border-gray-700">
                            collections
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 桌面端主题切换按钮 -->
        <div class="absolute right-4 top-1/2 transform -translate-y-1/2 hidden md:block">
            {% include theme-toggle.html %}
        </div>

        <!-- 移动端控件 -->
        <div class="md:hidden flex items-center justify-between w-full">
            <button id="menu-btn" class="flex flex-col space-y-1 p-2 text-black dark:text-white" aria-label="打开菜单"
                aria-expanded="false" aria-controls="menu">
                <span class="w-6 h-0.5 bg-current transition-all"></span>
                <span class="w-6 h-0.5 bg-current transition-all"></span>
                <span class="w-6 h-0.5 bg-current transition-all"></span>
            </button>
            {% include theme-toggle.html %}
        </div>

        <!-- 移动端菜单 -->
        <div id="menu"
            class="md:hidden absolute top-full left-4 right-4 bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-100 dark:border-gray-700 backdrop-blur-md hidden mt-3 z-50"
            role="menu" aria-labelledby="menu-btn">
            <div class="flex flex-col">
                <a href="{{ '/' | relative_url }}" role="menuitem"
                    class="px-4 py-3 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors font-bold block w-full px-5 py-4 text-left">
                    Home
                </a>
                <a href="{{ '/archive' | relative_url }}" role="menuitem"
                    class="px-4 py-3 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors block w-full px-5 py-4 text-left">
                    posts
                </a>
                <a href="{{ '/about' | relative_url }}" role="menuitem"
                    class="px-4 py-3 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors block w-full px-5 py-4 text-left">
                    About
                </a>
                <div class="w-full">
                    <button id="mobile-misc-btn" class="w-full flex items-center justify-between px-5 py-4 text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                        <span>Miscellany</span>
                        <svg class="w-4 h-4 transition-transform duration-200" id="mobile-misc-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="mobile-misc-menu" class="hidden flex-col bg-gray-50 dark:bg-gray-900/50">
                        <a href="{{ '/gomoku/' | relative_url }}" role="menuitem"
                            class="block w-full pl-8 pr-5 py-4 text-left text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
                            Gomoku
                        </a>
                        <a href="{{ '/hancolumnencoder/' | relative_url }}" role="menuitem"
                            class="block w-full pl-8 pr-5 py-4 text-left text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors border-t border-gray-100/50 dark:border-gray-800">
                            Han Column Encoder
                        </a>
                        <a href="{{ '/collections/' | relative_url }}" role="menuitem"
                            class="block w-full pl-8 pr-5 py-4 text-left text-black dark:text-white hover:text-blue-600 dark:hover:text-blue-400 transition-colors border-t border-gray-100/50 dark:border-gray-800">
                            collections
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>

<script>
    const menuBtn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');

    if (menuBtn && menu) {
        menuBtn.addEventListener('click', () => {
            if (menuBtn.classList.contains('open')) {
                menu.classList.add('hidden');
                menuBtn.classList.remove('open');
                menuBtn.setAttribute('aria-expanded', 'false');
            } else {
                menu.classList.remove('hidden');
                menuBtn.classList.add('open');
                menuBtn.setAttribute('aria-expanded', 'true');
            }
        });
    }

    const mobileMiscBtn = document.getElementById('mobile-misc-btn');
    const mobileMiscMenu = document.getElementById('mobile-misc-menu');
    const mobileMiscIcon = document.getElementById('mobile-misc-icon');

    if (mobileMiscBtn && mobileMiscMenu && mobileMiscIcon) {
        mobileMiscBtn.addEventListener('click', () => {
            mobileMiscMenu.classList.toggle('hidden');
            mobileMiscMenu.classList.toggle('flex');
            mobileMiscIcon.classList.toggle('rotate-180');
        });
    }
</script>
