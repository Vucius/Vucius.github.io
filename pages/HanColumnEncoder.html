<article class="max-w-4xl mx-auto px-4 md:px-6 pt-6 pb-32">
    <!-- 页面头部 -->
    <header class="text-center mb-16">
        <h1 class="text-4xl md:text-5xl font-medium text-gray-900 dark:text-white mb-6 tracking-tight leading-tight">
            Han Column Encoder
        </h1>
    </header>

    <!-- 加密面板 (Encode Panel) -->
    <div id="encodePanel" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
        <!-- 左侧：原文输入与设置 -->
        <div class="card-container flex flex-col bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 transition-all duration-300">
            <div class="flex items-center justify-between mb-4">
                <label for="inputText" class="text-sm font-semibold text-gray-700 dark:text-gray-300">
                    输入横排原文：
                </label>
            </div>
            
            <div class="relative w-full flex-1 mb-4 flex flex-col">
                <textarea id="inputText" rows="8" oninput="generateEncodedText()"
                    placeholder="请在此输入或粘贴需要转换为竖排的原文..." 
                    class="han-sans custom-scrollbar w-full h-48 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all resize-none"></textarea>
                    
                <button onclick="clearInput()" class="floating-btn" title="清空" aria-label="清空">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2-2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                </button>
            </div>

            <div class="flex items-center gap-4 bg-gray-50 dark:bg-gray-900 rounded-xl p-4 border border-gray-100 dark:border-gray-850">
                <label for="colHeight" class="text-sm font-semibold text-gray-700 dark:text-gray-300 whitespace-nowrap">每列字数（高）：</label>
                <div class="flex items-center gap-3 flex-1">
                    <input type="number" id="colHeight" value="18" min="5" max="50" oninput="generateEncodedText()"
                        class="w-20 px-3 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-center">
                </div>
            </div>

            <div class="flex items-center justify-between mb-4">
                <label for="encodedOutput" class="text-sm font-semibold text-gray-700 dark:text-gray-300">
                    生成的混淆密文（已将各行拼接）：
                </label>
            </div>
            
            <div class="relative w-full flex-1 flex flex-col">
                <div id="encodedOutput" contenteditable="false" tabindex="0"

                <button id="copyBtn" onclick="copyResult()" class="floating-btn" title="复制密文" aria-label="复制密文">

</article>

<script>
    let debounceTimer;

    function generateEncodedText() {
        const text = document.getElementById('inputText').value;
        const colHeight = parseInt(document.getElementById('colHeight').value) || 18;
        
        if (!text) {
            document.getElementById('encodedOutput').textContent = '';
            return;
        }

        document.getElementById('encodedOutput').textContent = '正在加密中...';
        
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            fetchEncodedText(text, colHeight);
        }, 300);
    }

    async function fetchEncodedText(text, colHeight) {
        try {
            // Check if localhost or production is used
            const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:3000/api/han-column-encode'
                : 'https://vukservices.vercel.app/api/han-column-encode';
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text, colHeight })
            });

            if (!response.ok) {
                throw new Error('API request failed');
            }

            const result = await response.json();
            if (result.success && result.data) {
                // Check if the input still matches the text we requested to avoid race conditions
                if (document.getElementById('inputText').value === text) {
                    document.getElementById('encodedOutput').textContent = result.data.encodedText;
                }
            } else {
                throw new Error(result.message || 'Unknown error');
            }
        } catch (error) {
            console.error('Failed to encode text:', error);
            if (document.getElementById('inputText').value === text) {
                document.getElementById('encodedOutput').textContent = '加密失败，请稍后重试。';
            }
        }
    }

    function clearInput() {
        document.getElementById('inputText').value = '';
        document.getElementById('encodedOutput').textContent = '';
        document.getElementById('colHeight').value = 18;
        document.getElementById('inputText').focus();
    }

    function copyResult() {
        const output = document.getElementById('encodedOutput');
        const textToCopy = output.textContent;
        if (!textToCopy) return;
        
        navigator.clipboard.writeText(textToCopy).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `
                <svg class="w-4 h-4 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            `;
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 2000);
        }).catch(err => {
            console.error('无法复制文本: ', err);
        });
    }

    // 初始运行一次
    generateEncodedText();

    // Hidden Authentication UI & Listener
    let keySequence = '';
    
    window.addEventListener('keydown', (e) => {
        if (e.isComposing) return; // Ignore IME composing
        
        const activeEl = document.activeElement;
        if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.getAttribute('contenteditable') === 'true')) {
            return;
        }

        if (e.key === 'Enter') {
            if (keySequence === 'FuckHC') {
                authAndUnlock(keySequence);
            }
            keySequence = '';
        } else if (e.key.length === 1) {
            keySequence += e.key;
            if (keySequence.length > 50) {
                keySequence = keySequence.slice(-50);
            }
        }
    });

    async function authAndUnlock(passcode) {
        if (!passcode) return; // Do not check on load for encoder, let it be just an encoder

        try {
            const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
                ? 'http://localhost:3000/api/han-column-auth'
                : 'https://vukservices.vercel.app/api/han-column-auth';
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ passcode: passcode })
            });
            const result = await response.json();
            
            if (result.success && result.data && result.data.authorized) {
                // Navigate to the standalone decoder page
                window.location.href = '/hancolumndecoder/';
            }
        } catch (err) {
            console.error('Auth error:', err);
        }
    }
</script>
