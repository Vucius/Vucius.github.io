<style>
    /* 仅在表格区域应用宋体和特定样式 */
    .han-table-container {
        overflow-x: auto;
    }
    .han-table {
        border-collapse: collapse;
        margin: 0 auto;
        background-color: #f5f5dc; /* 宣纸/米黄底色 */
    }
    /* 暗色模式下的表格底色 - Cyberpunk Style */
    .dark .han-table {
        background-color: rgba(15, 23, 42, 0.85);
        box-shadow: 0 0 20px rgba(79, 110, 247, 0.2);
    }
    .han-table td {
        font-family: "SimSun", "STSong", serif;
        border: 1px solid #333;
        padding: 8px 12px;
        text-align: center;
        font-size: 18px;
        width: 30px;
        height: 30px;
        color: #333;
    }
    .dark .han-table td {
        border-color: rgba(79, 110, 247, 0.4);
        color: #06b6d4; /* Neon cyan text */
        text-shadow: 0 0 8px rgba(6, 182, 212, 0.6);
    }
    textarea::placeholder {
        color: rgba(156, 163, 175, 0.5);
    }
</style>

<article class="max-w-4xl mx-auto px-4 md:px-6 pt-6 pb-32">
    <header class="text-center mb-16">
        <h1 class="text-4xl md:text-5xl font-medium text-gray-900 dark:text-white mb-6 tracking-tight leading-tight">
            Han Column Encoder
        </h1>
    </header>

    <!-- 输入面板与控制区 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
        <!-- 左侧：原文输入与设置 -->
        <div class="flex flex-col bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 transition-all duration-300">
            <div class="flex items-center justify-between mb-4">
                <label for="inputText" class="text-sm font-semibold text-gray-700 dark:text-gray-300">
                    输入横排原文：
                </label>
            </div>
            <textarea id="inputText" rows="8" oninput="generateEncodedText()"
                placeholder="请在此输入或粘贴需要转换为竖排的原文..." 
                class="w-full h-48 px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all font-sans resize-none mb-4"></textarea>

            <div class="flex items-center gap-4 bg-gray-50 dark:bg-gray-900 rounded-xl p-4 border border-gray-100 dark:border-gray-850">
                <label for="colHeight" class="text-sm font-semibold text-gray-700 dark:text-gray-300">每列字数（高）：</label>
                <input type="number" id="colHeight" value="18" min="5" max="50" oninput="generateEncodedText()"
                    class="w-20 px-3 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-center">
            </div>
        </div>

        <!-- 右侧：加密后的密文输出 -->
        <div class="flex flex-col bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 transition-all duration-300">
            <div class="flex items-center justify-between mb-4">
                <label for="encodedOutput" class="text-sm font-semibold text-gray-700 dark:text-gray-300">
                    生成的混淆密文（已将各行拼接）：
                </label>
                <button id="copyBtn" onclick="copyResult()" 
                    class="px-3 py-1 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-xs font-semibold rounded-lg hover:opacity-80 transition-opacity flex items-center gap-1">
                    <span>复制密文</span>
                </button>
            </div>
            <textarea id="encodedOutput" readonly rows="8"
                placeholder="生成后的连贯密文将显示在此处..." 
                class="w-full h-60 px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-850 dark:text-gray-200 focus:outline-none font-mono resize-none"></textarea>
        </div>
    </div>

    <!-- 下方：视觉效果预览 -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 transition-all duration-300">
        <h3 class="text-md font-semibold text-gray-700 dark:text-gray-300 mb-6 text-center">竖排排版视觉预览：</h3>
        <div class="han-table-container rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-700 shadow-sm transition-colors duration-300">
            <table id="resultTable" class="han-table w-full"></table>
        </div>
    </div>
</article>

<script>
    function generateEncodedText() {
        const text = document.getElementById('inputText').value;
        const colHeight = parseInt(document.getElementById('colHeight').value) || 18;
        
        if (!text) {
            document.getElementById('encodedOutput').value = '';
            document.getElementById('resultTable').innerHTML = '';
            return;
        }
        
        const N = text.length;
        const numCols = Math.ceil(N / colHeight);
        
        // 1. 生成并显示各行拼接后的密文
        let encodedResult = '';
        for (let r = 0; r < colHeight; r++) {
            for (let c = numCols - 1; c >= 0; c--) {
                const idx = c * colHeight + r;
                if (idx < N) {
                    encodedResult += text[idx];
                } else {
                    encodedResult += ' '; // 用空格填充不足的部分
                }
            }
        }
        document.getElementById('encodedOutput').value = encodedResult;
        
        // 2. 渲染下方视觉表格供作者参考
        const table = document.getElementById('resultTable');
        table.innerHTML = '';
        
        for (let row = 0; row < colHeight; row++) {
            const tr = document.createElement('tr');
            for (let col = numCols - 1; col >= 0; col--) {
                const td = document.createElement('td');
                const charIndex = col * colHeight + row;
                
                if (charIndex < N) {
                    td.textContent = text[charIndex];
                } else {
                    // 空白填充格样式
                    const isDark = document.documentElement.classList.contains('dark');
                    td.style.backgroundColor = isDark ? 'rgba(79, 110, 247, 0.1)' : '#e8e8d3'; 
                    td.innerHTML = '&nbsp;';
                }
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
    }

    // 初始运行一次
    generateEncodedText();

    // 监听暗色模式切换，以重绘表格背景
    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.attributeName === 'class') {
                generateEncodedText();
            }
        });
    });
    observer.observe(document.documentElement, { attributes: true });

    function copyResult() {
        const output = document.getElementById('encodedOutput');
        if (!output.value) return;
        
        navigator.clipboard.writeText(output.value).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span>已复制!</span>';
            btn.style.opacity = '0.7';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
            }, 2000);
        }).catch(err => {
            console.error('无法复制文本: ', err);
        });
    }
</script>
