<style>
    /* 仅在表格区域应用宋体和特定样式 */
    .han-table-container {
        overflow-x: auto;
    }
    .han-table {
        border-collapse: collapse;
        margin: 0 auto;
        background-color: #f5f5dc; /* 宣纸/米黄底色 */
    }
    /* 暗色模式下的表格底色 - Cyberpunk Style */
    .dark .han-table {
        background-color: rgba(15, 23, 42, 0.85);
        box-shadow: 0 0 20px rgba(79, 110, 247, 0.2);
    }
    .han-table td {
        font-family: "SimSun", "STSong", serif;
        border: 1px solid #333;
        padding: 8px 12px;
        text-align: center;
        font-size: 18px;
        width: 30px;
        height: 30px;
        color: #333;
    }
    .dark .han-table td {
        border-color: rgba(79, 110, 247, 0.4);
        color: #06b6d4; /* Neon cyan text */
        text-shadow: 0 0 8px rgba(6, 182, 212, 0.6);
    }
</style>

<article class="max-w-4xl mx-auto px-4 md:px-6 pt-6 pb-32">
    <!-- 页面头部 -->
    <header class="text-center mb-16">
        <h1 class="text-4xl md:text-5xl font-medium text-gray-900 dark:text-white mb-6 tracking-tight leading-tight">
            Han Column Encoder
        </h1>
        <p class="text-xl text-gray-600 dark:text-gray-400 font-light max-w-2xl mx-auto">
            古文竖排格式生成器 — 从上到下、从右到左
        </p>
    </header>

    <!-- 控制面板 -->
    <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl p-6 mb-12 flex flex-col sm:flex-row items-center justify-center gap-4 border border-gray-100 dark:border-gray-700 shadow-sm transition-colors duration-300">
        <label for="colHeight" class="text-gray-700 dark:text-gray-300 font-medium">每列字数：</label>
        <input type="number" id="colHeight" value="20" min="5" max="50" 
            class="w-24 px-3 py-2 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-colors">
        <button onclick="regenerateTable()" 
            class="px-6 py-2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-medium rounded-full hover:opacity-80 transition-opacity focus:outline-none focus:ring-2 focus:ring-gray-500/50">
            重新生成
        </button>
    </div>

    <!-- 结果展示区 -->
    <div class="han-table-container rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-700 shadow-sm transition-colors duration-300">
        <table id="resultTable" class="han-table w-full"></table>
    </div>

    <script>
        const originalText = `神州气数已终问鼎寰球之机逝矣察其民情犹盲信昔日之故神殊不知此神者实万恶之首灭世之魁昔其当政决断乖谬致千万生灵涂炭国力大损文明倒退数十载及其殁继之者讳其恶掩其迹禁万民述其真史致使今日之世愚民犹对朽像尸祝膜拜以此为尊执迷弗悟诚积重难返也夫天下无生而为奴者盖因慷慷英雄已死绝存者之众清醒者则柔懦自保冥顽者则倒行逆施至若今日之王德薄而位尊才疏而好战既无远瞩之决断又多怙过之成见致国势日蹙危如累卵王道既穷终焉之途唯余穷兵黩武而已`;

        function regenerateTable() {
            const colHeight = parseInt(document.getElementById('colHeight').value) || 20;
            const table = document.getElementById('resultTable');
            table.innerHTML = '';
            
            // 计算需要多少列
            const totalChars = originalText.length;
            const numCols = Math.ceil(totalChars / colHeight);
            
            // 创建表格：每行代表一个高度位置，每列代表一个竖列
            for (let row = 0; row < colHeight; row++) {
                const tr = document.createElement('tr');
                
                // 从右到左填充列（倒序）
                for (let col = numCols - 1; col >= 0; col--) {
                    const td = document.createElement('td');
                    const charIndex = col * colHeight + row;
                    
                    if (charIndex < totalChars) {
                        td.textContent = originalText[charIndex];
                    } else {
                        // 空白填充格的颜色
                        const isDark = document.documentElement.classList.contains('dark');
                        td.style.backgroundColor = isDark ? 'rgba(79, 110, 247, 0.1)' : '#e8e8d3'; 
                        td.innerHTML = '&nbsp;';
                    }
                    
                    tr.appendChild(td);
                }
                
                table.appendChild(tr);
            }
        }

        // 初始生成
        regenerateTable();

        // 监听暗色模式切换，重新渲染以更新空白格颜色
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'class') {
                    regenerateTable();
                }
            });
        });
        observer.observe(document.documentElement, { attributes: true });
    </script>
</article>
