                class="w-full h-80 px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all font-mono resize-none"></textarea>
        </div>

        <div class="flex flex-col bg-white dark:bg-gray-800 rounded-2xl border border-gray-100 dark:border-gray-700 shadow-sm p-6 transition-all duration-300">

                </label>

                placeholder="此处将显示还原后的文本..." 
                class="w-full h-80 px-4 py-3 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-800 dark:text-gray-200 focus:outline-none font-mono resize-none"></textarea>

<script>
    function decodeText() {
        const input = document.getElementById('encodedInput').value;
        if (!input) {
            document.getElementById('decodedOutput').value = '';
            return;
        }
        
        // 分割行，并过滤回车符
        const lines = input.split('\n').map(l => l.replace('\r', ''));
        let grid = [];
        
        // 检测分隔符：优先检查是否含制表符（来自HTML表格拷贝）
        let hasTab = lines.some(line => line.includes('\t'));
        
        for (let line of lines) {
            // 忽略开头完全为空的行
            if (grid.length === 0 && line.trim() === '') continue;
            
            let cells = [];
            if (hasTab) {
                cells = line.split('\t');
            } else {
                const trimmed = line.trim();
                // 检查是否是用空格分隔的
                if (trimmed.includes(' ')) {
                    cells = line.split(/\s+/);
                } else {
                    // 没有空格则将每个字符视为一列
                    cells = Array.from(line);
                }
            }
            grid.push(cells);
        }
        
        // 过滤掉末尾全为空的行
        while (grid.length > 0 && grid[grid.length - 1].every(cell => cell.trim() === '')) {
            grid.pop();
        }
        
        if (grid.length === 0) {
            document.getElementById('decodedOutput').value = '';
            return;
        }
        
        const numRows = grid.length;
        const numCols = Math.max(...grid.map(row => row.length));
        
        // 对齐各行宽度
        for (let r = 0; r < numRows; r++) {
            while (grid[r].length < numCols) {
                grid[r].push('');
            }
        }
        
        // 从右向左按列还原，再逐行拼接 (Visual Column = numCols - 1 - col)
        let result = '';
        for (let col = 0; col < numCols; col++) {
            let vc = numCols - 1 - col;
            for (let row = 0; row < numRows; row++) {
                let cell = grid[row][vc];
                if (cell !== undefined) {
                    let char = cell.replace(/\u00a0/g, ' '); // 替换不换行空格
                    result += char;
                }
            }
        }
        
        // 去除末尾的填充空格并显示
        document.getElementById('decodedOutput').value = result.trimEnd();
    }

    function clearInput() {
        document.getElementById('encodedInput').value = '';
        document.getElementById('decodedOutput').value = '';
        document.getElementById('encodedInput').focus();
    }

    function copyResult() {
        const output = document.getElementById('decodedOutput');
        if (!output.value) return;
        
        navigator.clipboard.writeText(output.value).then(() => {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span>已复制!</span>';
            btn.style.opacity = '0.7';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
            }, 2000);
        }).catch(err => {
            console.error('无法复制文本: ', err);
        });
    }
</script>
