<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" href="data:image/x-icon;base64,">

    <!-- CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/tailwind.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/remix.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/prose.css' | relative_url }}">
</head>

<body class="min-h-screen bg-white transition-colors duration-300">
    {% include header.html %}

    <main class="min-h-screen" role="main" aria-label="主要内容">
        {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ '/assets/js/scroll-text.js' | relative_url }}"></script>
</body>

</html>
